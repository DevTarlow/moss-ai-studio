name: Deploy to Firebase Hosting

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm install -g firebase-tools@latest
      - run: firebase --version
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - run: |
          echo "--- Checking Firebase project access ---"
          firebase projects:list 2>&1
          echo "--- Checking hosting sites ---"
          firebase hosting:sites:list --project mossaistudio 2>&1
          echo "--- Attempting deploy ---"
          firebase deploy --only hosting,functions --non-interactive --project mossaistudio --debug 2>&1
