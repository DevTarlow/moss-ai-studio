name: Deploy to Firebase Hosting

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm install -g firebase-tools@latest
      - run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > ${{ runner.temp }}/ga.json
      - run: |
          echo "Checking JSON validity..."
          python3 -c "import json; json.load(open('${{ runner.temp }}/ga.json')); print('JSON valid, project_id:', json.load(open('${{ runner.temp }}/ga.json'))['project_id'])"
      - run: |
          firebase deploy --only hosting,functions --non-interactive --project mossaistudio --debug 2>&1 || true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/ga.json
